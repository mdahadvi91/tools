<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF – Hridoy PDF Tools</title>

<!-- MAIN STYLE -->
<link rel="stylesheet" href="../style.css">

<!-- LAYOUT SYSTEM -->
<script src="../assets/layout.js" defer></script>

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- AUTO HEADER -->
<div id="header"></div>

<!-- AUTO SIDEBAR -->
<div id="sidebar"></div>

<main>

<!-- ADS TOP -->
<div id="adsTop"></div>

<section class="uploadBox">

<h2>📄 JPG to PDF PRO</h2>

<!-- OPTIONS -->
<div class="options">
<select id="pageSize">
<option value="a4">A4</option>
<option value="a3">A3</option>
<option value="a5">A5</option>
<option value="letter">Letter</option>
<option value="legal">Legal</option>
</select>

<select id="quality">
<option value="1">High</option>
<option value="0.7">Medium</option>
<option value="0.4">Low</option>
</select>
</div>

<!-- DROP AREA -->
<div id="dropArea">📂 Click or Drag Images</div>
<input type="file" id="imageInput" multiple hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<!-- BUTTONS -->
<button id="convertBtn" class="convertBtn">Convert & Preview</button>
<button id="downloadBtn" class="convertBtn" style="display:none;background:green;">
Download PDF
</button>

<!-- PDF VIEW -->
<iframe id="pdfPreview" class="pdfPreview" style="display:none;"></iframe>

</section>

<!-- ADS BOTTOM -->
<div id="adsBottom"></div>

</main>

<!-- AUTO FOOTER -->
<div id="footer"></div>

<!-- MAIN JS -->
<script src="../script.js"></script>

<!-- LOADER FIX -->
<script>
window.addEventListener("load", ()=>{
  document.getElementById("loader").style.display = "none";
});
</script>

<!-- TOOL SCRIPT -->
<script>

const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];
let pdfBlob = null;

// CLICK
drop.onclick = () => input.click();

// INPUT
input.addEventListener("change", (e)=>{
  handleFiles(e.target.files);
});

// DRAG
drop.addEventListener("dragover", e=>e.preventDefault());

drop.addEventListener("drop", e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// HANDLE FILES
function handleFiles(files){
  for(let file of files){
    images.push(file);
  }
  render();
}

// PREVIEW
function render(){
  preview.innerHTML="";
  images.forEach(file=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

// CONVERT
document.getElementById("convertBtn").onclick = async ()=>{

  if(images.length===0){
    alert("Select images");
    return;
  }

  const { jsPDF } = window.jspdf;

  let size=document.getElementById("pageSize").value;

  let sizes={
    a4:[210,297],
    a3:[297,420],
    a5:[148,210],
    letter:[216,279],
    legal:[216,356]
  };

  let [w,h]=sizes[size];

  let pdf=new jsPDF("p","mm",[w,h]);

  for(let i=0;i<images.length;i++){

    let base64=await toBase64(images[i]);

    let img=new Image();
    img.src=base64;

    await new Promise(r=>img.onload=r);

    let ratio=Math.min(w/img.width, h/img.height);

    let iw=img.width*ratio;
    let ih=img.height*ratio;

    let x=(w-iw)/2;
    let y=(h-ih)/2;

    if(i>0) pdf.addPage();

    pdf.addImage(base64,"JPEG",x,y,iw,ih);
  }

  pdfBlob=pdf.output("blob");

  document.getElementById("pdfPreview").src = URL.createObjectURL(pdfBlob);
  document.getElementById("pdfPreview").style.display="block";
  document.getElementById("downloadBtn").style.display="inline-block";
};

// DOWNLOAD
document.getElementById("downloadBtn").onclick=()=>{
  if(pdfBlob){
    let a=document.createElement("a");
    a.href=URL.createObjectURL(pdfBlob);
    a.download="Hridoy.pdf";
    a.click();
  }
};

// BASE64
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result);
  });
}

</script>

</body>
</html>
