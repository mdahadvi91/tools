<option value="a4">A4</option>

<option value="legal">Legal</option>

</select>

<div id="preview"></div>

<!-- BUTTON -->

</footer>

<script src="../script.js"></script>

<!-- ✅ TOOL SCRIPT (ISOLATED FIX) -->
<script>

const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];
let pdfBlob = null;

// CLICK
drop.onclick = () => input.click();

// INPUT CHANGE
input.addEventListener("change", (e)=>{
  handleFiles(e.target.files);
});

// DRAG DROP
drop.addEventListener("dragover", e=>e.preventDefault());

drop.addEventListener("drop", e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// HANDLE FILE
function handleFiles(files){
  for(let file of files){
    images.push(file);
  }
  render();
}

// PREVIEW
function render(){
  preview.innerHTML="";

  images.forEach((file,i)=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

// CONVERT
document.getElementById("convertBtn").onclick = async ()=>{

  if(images.length===0){
    alert("Select images");
    return;
  }

  const { jsPDF } = window.jspdf;

  let size=document.getElementById("pageSize").value;

  let sizes={
    a4:[210,297],a3:[297,420],a5:[148,210],
    letter:[216,279],legal:[216,356]
  };

  let [w,h]=sizes[size];

  let pdf=new jsPDF("p","mm",[w,h]);

  for(let i=0;i<images.length;i++){

    let base64=await toBase64(images[i]);

    let img=new Image();
    img.src=base64;

    await new Promise(r=>img.onload=r);

    let ratio=Math.min(w/img.width, h/img.height);

    let iw=img.width*ratio;
    let ih=img.height*ratio;

    let x=(w-iw)/2;
    let y=(h-ih)/2;

    if(i>0) pdf.addPage();

    pdf.addImage(base64,"JPEG",x,y,iw,ih);
  }

  pdfBlob=pdf.output("blob");

  document.getElementById("pdfPreview").src=URL.createObjectURL(pdfBlob);
  document.getElementById("pdfPreview").style.display="block";
  document.getElementById("downloadBtn").style.display="inline-block";
};

// DOWNLOAD
document.getElementById("downloadBtn").onclick=()=>{
  if(pdfBlob){
    let a=document.createElement("a");
    a.href=URL.createObjectURL(pdfBlob);
    a.download="Hridoy.pdf";
    a.click();
  }
};

// BASE64
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result);
  });
}

</script>
