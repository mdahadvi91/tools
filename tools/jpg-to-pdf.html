<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JPG to PDF Converter</title>

<link rel="stylesheet" href="../style.css">
<script src="../assets/layout.js" defer></script>

<style>
body { background:#111; color:#fff; font-family:Arial,sans-serif; text-align:center; padding:20px; }
h1 { margin-bottom:20px; }
.upload-box { border:2px dashed #555; padding:20px; border-radius:10px; max-width:500px; margin:0 auto 20px; }
input[type=file] { display:block; margin:15px auto; }
button { padding:10px 20px; font-size:16px; cursor:pointer; background:#00c896; border:none; border-radius:5px; color:#fff; }
button:hover { background:#00a67d; }
.preview-container { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
.preview-item { position:relative; border:1px solid #555; border-radius:5px; overflow:hidden; width:120px; height:120px; }
.preview-item img { width:100%; height:100%; object-fit:cover; }
.cross { position:absolute; top:3px; right:3px; background:red; color:#fff; border-radius:50%; width:20px; height:20px; line-height:20px; text-align:center; cursor:pointer; }
.progress-container { margin-top:20px; width:80%; max-width:400px; margin-left:auto; margin-right:auto; background:#222; border-radius:5px; height:20px; overflow:hidden; }
.progress-bar { height:100%; width:0; background:#00c896; transition:width 0.3s; }
#downloadLink { display:block; margin-top:20px; color:#00c896; font-size:16px; }
</style>
</head>
<body>

<!-- HEADER / SIDEBAR -->
<div id="header"></div>
<div id="sidebar"></div>

<!-- Ads -->
<div id="adsTop"></div>
<div id="adsMiddle"></div>
<div id="adsBottom"></div>
<div class="adSticky">Ad Space</div>

<main>
<h1>JPG → PDF Converter</h1>

<div class="upload-box">
  <input type="file" id="fileInput" multiple accept="image/jpeg,image/png">
  <button onclick="convertPDF()">Convert to PDF</button>
</div>

<div class="preview-container" id="previewContainer"></div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<a id="downloadLink">Download PDF ✅</a>
</main>

<div id="footer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const { jsPDF } = window.jspdf;
let files = [];

const fileInput = document.getElementById("fileInput");
const previewContainer = document.getElementById("previewContainer");
const progressBar = document.getElementById("progressBar");
const downloadLink = document.getElementById("downloadLink");

fileInput.addEventListener("change", (e)=>{
  for(const file of e.target.files){
    files.push(file);
    const reader = new FileReader();
    const div = document.createElement("div");
    div.classList.add("preview-item");
    const cross = document.createElement("div");
    cross.classList.add("cross");
    cross.innerText="×";
    cross.onclick = ()=>{ 
      files = files.filter(f=>f!==file); 
      div.remove();
    };
    div.appendChild(cross);
    reader.onload = (ev)=>{
      const img = document.createElement("img");
      img.src = ev.target.result;
      div.appendChild(img);
    };
    reader.readAsDataURL(file);
    previewContainer.appendChild(div);
  }
});

function convertPDF(){
  if(files.length===0){ alert("Select at least one file!"); return; }
  const pdf = new jsPDF({ orientation:"portrait", unit:"px", format:"a4" });
  let loaded = 0;
  progressBar.style.width="0%";

  files.forEach((file,index)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        const ratio = Math.min(pdfWidth/img.width, pdfHeight/img.height);
        const width = img.width * ratio;
        const height = img.height * ratio;
        if(index>0) pdf.addPage();
        pdf.addImage(img, 'JPEG', (pdfWidth-width)/2, (pdfHeight-height)/2, width, height);
        loaded++;
        progressBar.style.width = ((loaded/files.length)*100)+"%";
        if(loaded===files.length){
          const pdfBlob = pdf.output('blob');
          const url = URL.createObjectURL(pdfBlob);
          downloadLink.href=url;
          downloadLink.download="converted.pdf";
          downloadLink.style.display="block";
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
