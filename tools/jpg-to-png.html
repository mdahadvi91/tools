<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JPG to PNG Converter</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: #fff;
      padding: 30px;
    }

    .box {
      border: 2px dashed #555;
      padding: 30px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input {
      margin-top: 15px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #00c896;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #00a67d;
    }

    a {
      display: none;
      margin-top: 20px;
      color: #00c896;
    }
  </style>
</head>
<body>

<h1>JPG to PNG Converter 🔥</h1>

<div class="box">
  <p>Select JPG Image</p>
  <input type="file" id="upload" accept="image/jpeg">
  <br>
  <button onclick="convert()">Convert to PNG</button>
</div>

<a id="downloadLink">Download PNG</a>

<script>
function convert() {
  const file = document.getElementById("upload").files[0];

  if (!file) {
    alert("Please select an image");
    return;
  }

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(e) {
    img.src = e.target.result;
  }

  img.onload = function() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const pngUrl = canvas.toDataURL("image/png");

    const link = document.getElementById("downloadLink");
    link.href = pngUrl;
    link.download = "converted.png";
    link.style.display = "block";
    link.innerText = "Download PNG ✅";
  }

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
