<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">

<title>JPG to PNG – Hridoy PDF Tools</title>

<meta name="description" content="Convert JPG images to PNG online free.">

<link rel="stylesheet" href="../style.css">
<script src="../assets/layout.js" defer></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3714036715427207"
crossorigin="anonymous"></script>

</head>

<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div id="header"></div>
<div id="sidebar"></div>

<main>

<div id="adsTop"></div>

<section class="uploadBox">

<h2>🖼️ JPG to PNG</h2>

<div id="dropArea">📂 Click or Drag JPG Images</div>
<input type="file" id="imageInput" accept="image/jpeg" multiple hidden>

<div id="preview"></div>

<button id="convertBtn" class="convertBtn">Convert to PNG</button>

</section>

<div id="adsBottom"></div>

</main>

<div id="footer"></div>

<script src="../script.js"></script>

<script>
window.addEventListener("load", ()=>{
  const loader = document.getElementById("loader");
  if(loader) loader.style.display = "none";
});
</script>

<!-- ✅ FIXED SCRIPT -->
<script>

window.addEventListener("DOMContentLoaded", ()=>{

const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");
const btn = document.getElementById("convertBtn");

let images = [];

// CLICK
drop.addEventListener("click", ()=> input.click());

// INPUT
input.addEventListener("change", (e)=>{
  handleFiles(e.target.files);
});

// DRAG
drop.addEventListener("dragover", e=>e.preventDefault());

drop.addEventListener("drop", e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// HANDLE
function handleFiles(files){
  for(let file of files){
    if(file.type.includes("jpeg") || file.type.includes("jpg")){
      images.push(file);
    }
  }
  render();
}

// PREVIEW
function render(){
  preview.innerHTML="";
  images.forEach(file=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

// ✅ CONVERT FIXED
btn.addEventListener("click", async ()=>{

  if(images.length===0){
    alert("Select JPG images");
    return;
  }

  for(let file of images){

    let img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(resolve=>{
      img.onload = resolve;
    });

    let canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(img,0,0);

    let pngUrl = canvas.toDataURL("image/png");

    let a = document.createElement("a");
    a.href = pngUrl;
    a.download = file.name.replace(/\.jpe?g/i, ".png");
    a.click();
  }

});

});
</script>

</body>
</html>
