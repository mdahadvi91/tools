<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JPG to PNG Converter</title>
<link rel="stylesheet" href="../style.css">
<script src="../assets/layout.js" defer></script>
<style>
body {
  text-align: center;
  padding: 30px;
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
}
.box {
  border: 2px dashed #555;
  padding: 30px;
  border-radius: 10px;
  margin: 20px auto;
  max-width: 400px;
}
input, button {
  margin-top: 15px;
}
button {
  padding: 10px 20px;
  border: none;
  background: #00c896;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
}
button:hover {
  background: #00a67d;
}
a#downloadLink {
  display: none;
  margin-top: 20px;
  color: #00c896;
}
</style>
</head>
<body>

<!-- HEADER & SIDEBAR -->
<div id="header"></div>
<div id="sidebar"></div>

<!-- Main content -->
<main>
<h1>JPG → PNG Converter 🔥</h1>
<div class="box">
  <p>Select JPG Image</p>
  <input type="file" id="upload" accept="image/jpeg">
  <br>
  <button onclick="convert()">Convert to PNG</button>
</div>

<a id="downloadLink">Download PNG</a>
</main>

<div id="footer"></div>

<script>
function convert() {
  const file = document.getElementById("upload").files[0];
  if (!file) { alert("Please select an image"); return; }

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(e) { img.src = e.target.result; }

  img.onload = function() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const pngUrl = canvas.toDataURL("image/png");
    const link = document.getElementById("downloadLink");
    link.href = pngUrl;
    link.download = "converted.png";
    link.style.display = "block";
    link.innerText = "Download PNG ✅";
  }

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
