<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">

<title>JPG to PNG – Hridoy PDF Tools</title>

<!-- SEO -->
<meta name="description" content="Convert JPG images to PNG online free. Fast and secure image converter.">
<link rel="canonical" href="https://yourdomain.com/tools/jpg-to-png.html">

<!-- STYLE -->
<link rel="stylesheet" href="../style.css">

<!-- LAYOUT -->
<script src="../assets/layout.js" defer></script>

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ADSENSE -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3714036715427207"
crossorigin="anonymous"></script>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- AUTO LOAD -->
<div id="header"></div>
<div id="sidebar"></div>

<main>

<!-- ADS TOP -->
<div id="adsTop"></div>

<section class="uploadBox">

<h2>🖼️ JPG to PNG</h2>

<!-- DROP -->
<div id="dropArea">📂 Click or Drag JPG Images</div>
<input type="file" id="imageInput" accept="image/jpeg" multiple hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<!-- BUTTON -->
<button id="convertBtn" class="convertBtn">Convert to PNG</button>

</section>

<!-- ADS BOTTOM -->
<div id="adsBottom"></div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- MAIN JS -->
<script src="../script.js"></script>

<!-- LOADER FIX -->
<script>
window.addEventListener("load", ()=>{
  const loader = document.getElementById("loader");
  if(loader) loader.style.display = "none";
});
</script>

<!-- TOOL SCRIPT -->
<script>

const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];

// CLICK
drop.onclick = () => input.click();

// INPUT
input.addEventListener("change", (e)=>{
  handleFiles(e.target.files);
});

// DRAG
drop.addEventListener("dragover", e=>e.preventDefault());

drop.addEventListener("drop", e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// HANDLE FILE
function handleFiles(files){
  for(let file of files){
    if(file.type.includes("jpeg")){
      images.push(file);
    }
  }
  render();
}

// PREVIEW
function render(){
  preview.innerHTML="";
  images.forEach((file,i)=>{
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

// CONVERT
document.getElementById("convertBtn").onclick = async ()=>{

  if(images.length===0){
    alert("Select JPG images");
    return;
  }

  for(let file of images){

    let img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(r=>img.onload=r);

    let canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(img,0,0);

    // PNG output
    let pngUrl = canvas.toDataURL("image/png");

    // DOWNLOAD
    let a = document.createElement("a");
    a.href = pngUrl;
    a.download = file.name.replace(".jpg",".png");
    a.click();
  }

};

</script>

</body>
</html>
