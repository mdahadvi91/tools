<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Compressor</title>
<link rel="stylesheet" href="../style.css">
<script src="../assets/layout.js" defer></script>
<style>
body { text-align:center; padding:30px; background:#111; color:#fff; font-family:Arial,sans-serif; }
.box { border:2px dashed #555; padding:30px; border-radius:10px; margin:20px auto; max-width:400px; }
input, button { margin-top:15px; }
button { padding:10px 20px; border:none; background:#007bff; color:#fff; font-size:16px; cursor:pointer; border-radius:5px; }
button:hover { background:#0056b3; }
a#downloadLink { display:none; margin-top:20px; color:#00c896; }
</style>
</head>
<body>

<div id="header"></div>
<div id="sidebar"></div>

<main>
<h1>Image Compressor 🔥</h1>
<div class="box">
  <p>Select Image (JPG/PNG)</p>
  <input type="file" id="upload" accept="image/png, image/jpeg">
  <br>
  <button onclick="compress()">Compress Image</button>
</div>
<a id="downloadLink">Download Compressed Image</a>
</main>

<div id="footer"></div>

<script>
function compress() {
  const file = document.getElementById("upload").files[0];
  if(!file){ alert("Please select an image"); return; }

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(e){ img.src = e.target.result; }

  img.onload = function(){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);

    const compressedUrl = canvas.toDataURL(file.type,0.6); // 60% quality
    const link = document.getElementById("downloadLink");
    link.href = compressedUrl;
    link.download = "compressed." + file.name.split('.').pop();
    link.style.display="block";
    link.innerText="Download Compressed ✅";
  }

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
