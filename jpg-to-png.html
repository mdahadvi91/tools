<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PNG</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:30px;
}

.container{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.addBtn{
background:#2196f3;
color:white;
border:none;
padding:12px 18px;
font-size:18px;
border-radius:50px;
cursor:pointer;
}

.preview{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.preview img{
width:100%;
border-radius:6px;
}

.convert{
margin-top:20px;
background:#e53935;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>JPG to PNG Converter</h2>

<input type="file" id="fileInput" accept="image/jpeg" multiple hidden>

<button class="addBtn" onclick="document.getElementById('fileInput').click()">
➕ Add Images
</button>

<div class="preview" id="preview"></div>

<button class="convert" onclick="convert()">Convert</button>

</div>

<script>

let images=[];

document.getElementById("fileInput").addEventListener("change",function(){

const files=this.files;

for(let file of files){

images.push(file);

const img=document.createElement("img");

img.src=URL.createObjectURL(file);

document.getElementById("preview").appendChild(img);

}

});

function convert(){

if(images.length===0){
alert("Add images first");
return;
}

images.forEach(file=>{

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");

canvas.width=img.width;
canvas.height=img.height;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0);

const link=document.createElement("a");

link.download="converted.png";

link.href=canvas.toDataURL("image/png");

link.click();

};

img.src=URL.createObjectURL(file);

});

}

</script>

</body>
</html>
