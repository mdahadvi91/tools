<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF – Hridoy PDF Tools</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;}

#dropArea{
border:2px dashed #ccc;
padding:40px;
text-align:center;
cursor:pointer;
border-radius:10px;
}

#preview{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.previewItem{position:relative;}
.previewItem img{width:100%;}

.actions{
position:absolute;
top:5px;
right:5px;
display:flex;
gap:5px;
}

.actions button{
border:none;
padding:5px;
cursor:pointer;
background:white;
border-radius:5px;
}

/* CLEAN OPTIONS UI */
.options{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:15px 0;
}

.options select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

/* PDF PREVIEW */
.pdfPreview{
margin-top:20px;
width:100%;
height:400px;
border:1px solid #ccc;
border-radius:8px;
}
</style>
</head>

<body>

<header class="header">
<h2>❤️ Hridoy PDF</h2>
</header>

<main>

<section class="uploadBox">

<h2>📄 JPG to PDF PRO</h2>

<!-- ✅ ONLY 2 OPTIONS -->
<div class="options">

<select id="pageSize">
<option value="a4">A4</option>
<option value="a3">A3</option>
<option value="a5">A5</option>
<option value="letter">Letter</option>
<option value="legal">Legal</option>
<option value="tabloid">Tabloid</option>
<option value="b4">B4</option>
<option value="b5">B5</option>
</select>

<select id="quality">
<option value="1">High Quality</option>
<option value="0.7">Medium Quality</option>
<option value="0.4">Low Quality</option>
</select>

</div>

<!-- DROP -->
<div id="dropArea">📂 Click or Drag Images</div>
<input type="file" id="imageInput" multiple hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<!-- BUTTON -->
<button id="convertBtn" class="convertBtn">Convert & Preview</button>
<button id="downloadBtn" class="convertBtn" style="display:none;background:green;">Download PDF</button>

<!-- PDF VIEW -->
<iframe id="pdfPreview" class="pdfPreview" style="display:none;"></iframe>

</section>

</main>

<footer class="footer">© 2026 Hridoy PDF Tools</footer>

<script>
const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];
let pdfBlob = null;

// CLICK
drop.onclick = ()=>input.click();

// SELECT
input.addEventListener("change", e=>handleFiles(e.target.files));

// DROP
drop.addEventListener("dragover", e=>e.preventDefault());
drop.addEventListener("drop", e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

// HANDLE FILE
function handleFiles(files){
for(let file of files){
images.push({file,rotation:0});
}
render();
}

// RENDER PREVIEW
function render(){
preview.innerHTML="";

images.forEach((img,i)=>{
let div=document.createElement("div");
div.className="previewItem";

let image=document.createElement("img");
image.src=URL.createObjectURL(img.file);
image.style.transform=`rotate(${img.rotation}deg)`;

let actions=document.createElement("div");
actions.className="actions";

actions.innerHTML=`
<button onclick="rotate(${i},90)">↻</button>
<button onclick="removeImg(${i})">❌</button>
`;

div.appendChild(image);
div.appendChild(actions);
preview.appendChild(div);
});
}

// ROTATE / DELETE
function rotate(i,d){images[i].rotation+=d;render();}
function removeImg(i){images.splice(i,1);render();}

// CONVERT
document.getElementById("convertBtn").onclick=async()=>{

if(images.length===0){
alert("Select images");
return;
}

const { jsPDF } = window.jspdf;

let size=document.getElementById("pageSize").value;
let quality=parseFloat(document.getElementById("quality").value);

let sizes={
a4:[210,297],a3:[297,420],a5:[148,210],
letter:[216,279],legal:[216,356],
tabloid:[279,432],b4:[250,353],b5:[176,250]
};

let [w,h]=sizes[size];

let pdf=new jsPDF("p","mm",[w,h]);

for(let i=0;i<images.length;i++){

let base64=await toBase64(images[i].file);

let img=new Image();
img.src=base64;

await new Promise(r=>img.onload=r);

// ✅ AUTO FIT SYSTEM
let ratio=Math.min(w/img.width, h/img.height);
let iw=img.width*ratio;
let ih=img.height*ratio;

let x=(w-iw)/2;
let y=(h-ih)/2;

if(i>0) pdf.addPage();

pdf.addImage(base64,"JPEG",x,y,iw,ih,undefined,"FAST");

// progress optional (future)
}

pdfBlob=pdf.output("blob");

document.getElementById("pdfPreview").src=URL.createObjectURL(pdfBlob);
document.getElementById("pdfPreview").style.display="block";
document.getElementById("downloadBtn").style.display="inline-block";

};

// DOWNLOAD
document.getElementById("downloadBtn").onclick=()=>{
if(pdfBlob){
let a=document.createElement("a");
a.href=URL.createObjectURL(pdfBlob);
a.download="Hridoy.pdf";
a.click();
}
};

// BASE64
function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
});
}
</script>

</body>
</html>
