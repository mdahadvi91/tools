<!DOCTYPE html>
<html lang="en">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ✅ PDF LIBRARY -->

</head>

<body>

<!-- LOADER -->

</div>

<!-- HEADER -->
<header class="header">

<div class="headerSearch">

<input type="text" value="JPG to PDF Tool" readonly>
</div>

<button class="menuBtn" onclick="openRight()">
<i class="fa-solid fa-gear"></i>
</button>

</header>

<!-- 🔙 BACK BUTTON -->
<div class="backBar">
<button onclick="goBack()" class="backBtn">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</div>

<!-- 🔥 AD TOP -->
<div class="adBox">Ad Space (Top)</div>

<!-- SIDEBAR (same as before) -->
<div id="leftMenu" class="sidebar left">
<button class="close" onclick="closeLeft()">✖</button>

<h3>Tools</h3>
<a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
<a href="jpg-to-pdf.html"><i class="fa-solid fa-file-image red"></i> JPG to PDF</a>
</div>

<div id="rightMenu" class="sidebar right">
<button class="close" onclick="closeRight()">✖</button>

<button class="darkBtn" onclick="toggleDark()">
<i class="fa-solid fa-moon"></i> Dark Mode
</button>

<h3>Information</h3>
<a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
<a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
</div>

<div id="overlay" onclick="closeLeft();closeRight();"></div>

<!-- ================= TOOL ================= -->

<section class="uploadBox">

<h2>📄 JPG to PDF Converter</h2>

<!-- 🔧 OPTIONS -->
<div style="margin:15px 0; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">

<select id="pageSize">
<option value="a4">A4</option>
<option value="a3">A3</option>
<option value="a5">A5</option>
<option value="letter">Letter</option>
<option value="legal">Legal</option>
<option value="tabloid">Tabloid</option>
<option value="b4">B4</option>
<option value="b5">B5</option>
</select>

<select id="quality">
<option value="1">High</option>
<option value="0.7">Medium</option>
<option value="0.4">Low</option>
</select>

</div>

<!-- DROP -->
<label for="imageInput" id="dropArea">
📂 Click or Drag & Drop Images Here
</label>
</div>

<input type="file" id="imageInput" accept="image/*" multiple hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<!-- PROGRESS -->
<div class="progressBox">
<div id="progressBar"></div>
</div>

<button id="convertBtn" class="convertBtn">
Convert to PDF
</button>

</section>

<!-- 🔥 AD -->
<div class="adBox">Ad Space (Middle)</div>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 Hridoy PDF Tools</p>
</footer>

<script src="script.js"></script>

<!-- ================= 🔥 POWER SCRIPT ================= -->
<script>

const imageInput = document.getElementById("imageInput");
const dropArea = document.getElementById("dropArea");
const preview = document.getElementById("preview");
const convertBtn = document.getElementById("convertBtn");
const progressBar = document.getElementById("progressBar");

let images = [];

// CLICK
dropArea.onclick = () => imageInput.click();

// FILE SELECT
imageInput.addEventListener("change", handleFiles);

// DROP
dropArea.addEventListener("dragover", e=>e.preventDefault());

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFiles({target:{files:e.dataTransfer.files}});
});

// HANDLE FILE
function handleFiles(e){

images = [];
preview.innerHTML = "";

for(let file of e.target.files){

images.push(file);

let img = document.createElement("img");
img.src = URL.createObjectURL(file);
preview.appendChild(img);

}
}

// CONVERT
convertBtn.onclick = async ()=>{

if(images.length === 0){
alert("Select images first!");
return;
}

const { jsPDF } = window.jspdf;

let size = document.getElementById("pageSize").value;
let quality = parseFloat(document.getElementById("quality").value);

let w,h;

if(size==="a4"){w=210;h=297;}
if(size==="a3"){w=297;h=420;}
if(size==="a5"){w=148;h=210;}
if(size==="letter"){w=216;h=279;}
if(size==="legal"){w=216;h=356;}
if(size==="tabloid"){w=279;h=432;}
if(size==="b4"){w=250;h=353;}
if(size==="b5"){w=176;h=250;}

let pdf = new jsPDF("p","mm",[w,h]);

for(let i=0;i<images.length;i++){

let imgData = await toBase64(images[i]);

let img = new Image();
img.src = imgData;

await new Promise(r=>img.onload=r);

let ratio = Math.min(w/img.width, h/img.height);
let iw = img.width * ratio;
let ih = img.height * ratio;

let x = (w - iw)/2;
let y = (h - ih)/2;

if(i>0) pdf.addPage();

pdf.addImage(imgData,"JPEG",x,y,iw,ih,undefined,"FAST");

// REAL PROGRESS
let percent = Math.round(((i+1)/images.length)*100);
progressBar.style.width = percent + "%";

}

pdf.save("Hridoy-PDF.pdf");

};

// BASE64
function toBase64(file){
return new Promise((res)=>{
let reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=>res(reader.result);
});
}

</script>

</body>
</html>
