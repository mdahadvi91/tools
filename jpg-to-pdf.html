<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF – Hridoy PDF Tools</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* 🔥 TOOL EXTRA STYLE */

.settingsBar{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
margin:15px 0;
}

.settingsBar select{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
}

#dropArea{
border:2px dashed #ccc;
padding:35px;
border-radius:12px;
cursor:pointer;
text-align:center;
background:#fafafa;
transition:0.3s;
}

#dropArea:hover{
background:#f1f1f1;
}

#preview{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

#preview img{
width:100%;
border-radius:6px;
}

.backBar{
padding:10px 15px;
}

.backBtn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#333;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<!-- HEADER -->
<header class="header">

<div class="headerLeft">
<button class="menuBtn" onclick="openLeft()">
<i class="fa-solid fa-bars"></i>
</button>

<h2 class="logo">
<i class="fa-solid fa-heart"></i> Hridoy PDF
</h2>
</div>

<div class="headerSearch">
<i class="fa-solid fa-arrow-left"></i>
<input type="text" value="JPG to PDF Tool" readonly>
</div>

<button class="menuBtn" onclick="openRight()">
<i class="fa-solid fa-gear"></i>
</button>

</header>

<!-- BACK -->
<div class="backBar">
<button onclick="goBack()" class="backBtn">
<i class="fa-solid fa-arrow-left"></i> Back
</button>
</div>

<!-- AD -->
<div class="adBox">Ad Space (Top)</div>

<!-- SIDEBAR -->
<div id="leftMenu" class="sidebar left">
<button class="close" onclick="closeLeft()">✖</button>
<h3>Tools</h3>
<a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
</div>

<div id="rightMenu" class="sidebar right">
<button class="close" onclick="closeRight()">✖</button>
<button class="darkBtn" onclick="toggleDark()">
<i class="fa-solid fa-moon"></i> Dark Mode
</button>
</div>

<div id="overlay" onclick="closeLeft();closeRight();"></div>

<!-- ================= TOOL ================= -->

<section class="uploadBox">

<h2>📄 JPG to PDF Converter</h2>

<!-- SETTINGS -->
<div class="settingsBar">

<select id="pageSize">
<option value="a4">A4</option>
<option value="a3">A3</option>
<option value="a5">A5</option>
<option value="letter">Letter</option>
<option value="legal">Legal</option>
<option value="tabloid">Tabloid</option>
<option value="b4">B4</option>
<option value="b5">B5</option>
</select>

<select id="quality">
<option value="1">High</option>
<option value="0.7">Medium</option>
<option value="0.4">Low</option>
</select>

</div>

<!-- DROP -->
<div id="dropArea">
📂 Click or Drag & Drop Images Here
</div>

<input type="file" id="imageInput" accept="image/*" multiple hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<!-- PROGRESS -->
<div class="progressBox">
<div id="progressBar"></div>
</div>

<button id="convertBtn" class="convertBtn">
Convert to PDF
</button>

</section>

<div class="adBox">Ad Space (Middle)</div>

<footer class="footer">
<p>© 2026 Hridoy PDF Tools</p>
</footer>

<script src="script.js"></script>

<!-- 🔥 CORE LOGIC -->
<script>

function goBack(){
if(document.referrer){
history.back();
}else{
window.location.href="index.html";
}
}

const imageInput = document.getElementById("imageInput");
const dropArea = document.getElementById("dropArea");
const preview = document.getElementById("preview");
const convertBtn = document.getElementById("convertBtn");
const progressBar = document.getElementById("progressBar");

let images = [];

// CLICK
dropArea.onclick = ()=> imageInput.click();

// SELECT
imageInput.addEventListener("change", e=>{
handleFiles(e.target.files);
});

// DROP
dropArea.addEventListener("dragover", e=>{
e.preventDefault();
});

dropArea.addEventListener("drop", e=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

// HANDLE FILE
function handleFiles(files){

images = [];
preview.innerHTML = "";

for(let file of files){

images.push(file);

let img = document.createElement("img");
img.src = URL.createObjectURL(file);
preview.appendChild(img);

}

}

// CONVERT
convertBtn.onclick = async ()=>{

if(images.length===0){
alert("Select images first!");
return;
}

const { jsPDF } = window.jspdf;

let size = document.getElementById("pageSize").value;
let quality = parseFloat(document.getElementById("quality").value);

let sizes={
a4:[210,297],
a3:[297,420],
a5:[148,210],
letter:[216,279],
legal:[216,356],
tabloid:[279,432],
b4:[250,353],
b5:[176,250]
};

let [w,h]=sizes[size];

let pdf = new jsPDF("p","mm",[w,h]);

for(let i=0;i<images.length;i++){

let imgData = await toBase64(images[i]);

let img = new Image();
img.src = imgData;

await new Promise(r=>img.onload=r);

let ratio = Math.min(w/img.width, h/img.height);
let iw = img.width * ratio;
let ih = img.height * ratio;

let x = (w - iw)/2;
let y = (h - ih)/2;

if(i>0) pdf.addPage();

pdf.addImage(imgData,"JPEG",x,y,iw,ih,undefined,"FAST");

// PROGRESS
progressBar.style.width = ((i+1)/images.length)*100 + "%";

}

pdf.save("Hridoy-PDF.pdf");

};

function toBase64(file){
return new Promise(res=>{
let reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=>res(reader.result);
});
}

</script>

</body>
</html>
