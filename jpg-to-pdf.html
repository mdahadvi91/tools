<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF – Hridoy PDF Tools</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{display:flex;flex-direction:column;min-height:100vh;}
main{flex:1;}

#dropArea{
border:2px dashed #ccc;
padding:40px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

#preview{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.previewItem{
position:relative;
}

.previewItem img{
width:100%;
border-radius:6px;
}

.actions{
position:absolute;
top:5px;
right:5px;
display:flex;
gap:5px;
}

.actions button{
border:none;
padding:5px;
font-size:12px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<header class="header">
<h2 class="logo">❤️ Hridoy PDF</h2>
</header>

<main>

<section class="uploadBox">

<h2>📄 JPG to PDF PRO</h2>

<div id="dropArea">📂 Click or Drag Images</div>
<input type="file" id="imageInput" multiple hidden>

<div id="preview"></div>

<button id="convertBtn" class="convertBtn">Convert & Preview</button>

</section>

</main>

<footer class="footer">© 2026</footer>

<script>
const input = document.getElementById("imageInput");
const drop = document.getElementById("dropArea");
const preview = document.getElementById("preview");

let images = [];

drop.onclick = ()=>input.click();

input.addEventListener("change", e=>{
handleFiles(e.target.files);
});

function handleFiles(files){

for(let file of files){

let obj = {
file:file,
rotation:0
};

images.push(obj);
render();
}
}

function render(){
preview.innerHTML="";

images.forEach((imgObj,index)=>{

let div = document.createElement("div");
div.className="previewItem";

let img = document.createElement("img");
img.src = URL.createObjectURL(imgObj.file);
img.style.transform = `rotate(${imgObj.rotation}deg)`;

let actions = document.createElement("div");
actions.className="actions";

actions.innerHTML=`
<button onclick="rotate(${index},90)">↻</button>
<button onclick="rotate(${index},-90)">↺</button>
<button onclick="removeImg(${index})">❌</button>
`;

div.appendChild(img);
div.appendChild(actions);
preview.appendChild(div);

});
}

function rotate(i,deg){
images[i].rotation += deg;
render();
}

function removeImg(i){
images.splice(i,1);
render();
}

document.getElementById("convertBtn").onclick = async ()=>{

if(images.length===0){
alert("No images!");
return;
}

const { jsPDF } = window.jspdf;
let pdf = new jsPDF();

for(let i=0;i<images.length;i++){

let base64 = await toBase64(images[i].file);

let img = new Image();
img.src = base64;

await new Promise(r=>img.onload=r);

let w = pdf.internal.pageSize.getWidth();
let h = (img.height*w)/img.width;

if(i>0) pdf.addPage();

pdf.addImage(base64,"JPEG",0,0,w,h);

}

window.open(pdf.output("bloburl"));

};

function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
});
}
</script>

</body>
</html>
