<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF Tool</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/pdf-lib"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<script src="header.js"></script>

<div class="tool-header">

<h1>JPG to PDF</h1>

<p>
Convert JPG images into one PDF file easily.
Upload multiple images and download one PDF instantly.
</p>

</div>

<div class="uploadBox">

<input type="file" id="imageInput" multiple accept="image/jpeg">

<div id="preview"></div>

<button id="convertBtn" class="convertBtn">
Convert to PDF
</button>

</div>

<script src="footer.js"></script>
<script src="script.js"></script>

</body>
</html>
